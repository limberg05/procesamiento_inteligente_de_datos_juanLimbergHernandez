<!doctype html>
<html>
  <head>
    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
  </head>
  <body>
    <h2>Dibuja un número</h2>
    <canvas
      id="canvas"
      width="280"
      height="280"
      style="border: 2px solid black; cursor: crosshair; background: black"
    >
    </canvas>
    <br /><br />
    <button onclick="limpiar()">Limpiar</button>
    <h3>Predicción: <span id="resultado">...</span></h3>

    <script>
      var canvas = document.getElementById('canvas');
      var ctx = canvas.getContext('2d');
      ctx.strokeStyle = 'white';
      ctx.lineWidth = 18;
      var dibujando = false;

      canvas.onmousedown = () => (dibujando = true);
      canvas.onmousemove = (e) => {
        if (!dibujando) return;
        ctx.lineTo(e.offsetX, e.offsetY);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(e.offsetX, e.offsetY);
      };
      canvas.onmouseup = () => {
        dibujando = false;
        ctx.beginPath();
        enviar();
      };

      function enviar() {
        // Escalar el canvas a 28x28
        var temp = document.createElement('canvas');
        temp.width = 28;
        temp.height = 28;
        temp.getContext('2d').drawImage(canvas, 0, 0, 28, 28);
        var ctx2 = temp.getContext('2d');

        var pixels = [];
        for (var x = 0; x < 28; x++) {
          for (var y = 0; y < 28; y++) {
            var color = ctx2.getImageData(y, x, 1, 1).data[3] / 255;
            pixels.push((Math.round(color * 100) / 100).toFixed(2));
          }
        }

        $.post(
          'http://localhost:8000',
          { pixeles: pixels.join(',') },
          function (response) {
            $('#resultado').html(response);
          },
        );
      }

      function limpiar() {
        ctx.clearRect(0, 0, 280, 280);
        $('#resultado').html('...');
      }
    </script>
  </body>
</html>
